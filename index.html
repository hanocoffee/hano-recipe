<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hano coffee — Recipe</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1C1C1C;
    --surface: #242424;
    --border: #333333;
    --text: #E8E0D4;
    --text-muted: #7A7066;
    --accent-baschi: #C49A5A;
    --accent-muffin: #5A9E9E;
    --accent-baschi-dim: rgba(196,154,90,0.08);
    --accent-muffin-dim: rgba(90,158,158,0.08);
    --accent-cookie: #B86030;
    --accent-cookie-dim: rgba(184,96,48,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 36px 56px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 20px;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--text);
  }

  .slash { color: var(--border); font-size: 18px; }

  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.26em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  main {
    flex: 1;
    max-width: 820px;
    margin: 0 auto;
    width: 100%;
    padding: 72px 40px 80px;
  }

  .index-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 48px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .index-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .recipe-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .recipe-card {
    display: block;
    text-decoration: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 36px 32px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .recipe-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    transition: opacity 0.25s;
    opacity: 0.6;
  }

  .recipe-card.baschi::before { background: var(--accent-baschi); }
  .recipe-card.muffin::before { background: var(--accent-muffin); }

  .recipe-card.baschi:hover {
    background: var(--accent-baschi-dim);
    border-color: var(--accent-baschi);
  }

  .recipe-card.muffin:hover {
    background: var(--accent-muffin-dim);
    border-color: var(--accent-muffin);
  }

  .recipe-card.cookie::before { background: var(--accent-cookie); }
  .recipe-card.cookie:hover {
    background: var(--accent-cookie-dim);
    border-color: var(--accent-cookie);
  }

  .cookie .card-category { color: var(--accent-cookie); }
  .cookie .card-recipes li::before { background: var(--accent-cookie); opacity: 0.5; }

  .recipe-card:hover::before { opacity: 1; }

  .card-category {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .baschi .card-category { color: var(--accent-baschi); }
  .muffin .card-category { color: var(--accent-muffin); }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 8px;
  }

  .card-title-ja {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 28px;
  }

  .card-recipes {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card-recipes li {
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-recipes li::before {
    content: '';
    width: 4px;
    height: 4px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .baschi .card-recipes li::before { background: var(--accent-baschi); opacity: 0.5; }
  .muffin .card-recipes li::before { background: var(--accent-muffin); opacity: 0.5; }

  .card-arrow {
    position: absolute;
    bottom: 28px;
    right: 28px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    opacity: 0.2;
    transition: opacity 0.25s, transform 0.25s;
    color: var(--text);
  }

  .recipe-card:hover .card-arrow {
    opacity: 0.6;
    transform: translateX(4px);
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 22px 56px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--text-muted);
  }

  .footer-note {
    font-size: 11px;
    color: var(--border);
    letter-spacing: 0.1em;
  }

  @media (max-width: 600px) {
    header { padding: 24px 24px; }
    main { padding: 48px 24px 60px; }
    .recipe-grid { grid-template-columns: 1fr; }
    footer { padding: 20px 24px; flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <span class="logo">hano coffee</span>
  <span class="slash">/</span>
  <span class="page-title">Recipe</span>
</header>

<main>
  <div class="index-title">Recipe Index</div>

  <div class="recipe-grid">

    <a href="hano_recipe.html" class="recipe-card baschi">
      <div class="card-category">Cake</div>
      <div class="card-title">Basque<br>Cheesecake</div>
      <div class="card-title-ja">バスチー</div>
      <ul class="card-recipes">
        <li>No.1　バスチー</li>
        <li>No.2　カフェオレバスチー</li>
        <li>No.3　ピーナッツバターバスチー</li>
        <li>No.4　塩キャラメルバスチー</li>
      </ul>
      <span class="card-arrow">→</span>
    </a>

    <a href="hano_recipe_muffin.html" class="recipe-card muffin">
      <div class="card-category">Muffin</div>
      <div class="card-title">Muffin</div>
      <div class="card-title-ja">マフィン</div>
      <ul class="card-recipes">
        <li>Base　ベースレシピ</li>
        <li>No.1　ダブルチョコ</li>
        <li>No.2　オランジュショコラ</li>
        <li>No.3　コーヒーオレオ</li>
      </ul>
      <span class="card-arrow">→</span>
    </a>

    <a href="hano_recipe_cookie.html" class="recipe-card cookie">
      <div class="card-category">Cookie</div>
      <div class="card-title">Cookie</div>
      <div class="card-title-ja">クッキー</div>
      <ul class="card-recipes">
        <li>No.1　スモアクッキー</li>
      </ul>
      <span class="card-arrow">→</span>
    </a>

  </div>
</main>

<footer>
  <span class="footer-logo">hano coffee</span>
  <span class="footer-note">Internal Use Only</span>
</footer>

</body>
</html>
